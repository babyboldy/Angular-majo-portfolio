<section id="skills" class="section-pad">
  <div class="container">
    <div class="fade-in" style="text-align:center;max-width:600px;margin:0 auto 3rem;">
      <div class="section-tag" style="justify-content:center">What I Do</div>
      <h2 class="section-title">My <span class="accent">Services</span></h2>
      <p class="section-desc" style="margin:0 auto">From design to deployment — I cover the full spectrum of modern digital development.</p>
    </div>
    <div class="services-grid">
      <div class="service-card fade-in" *ngFor="let service of services; let i = index" [style.animation-delay.ms]="i * 100">
        <div class="service-icon">{{ service.icon }}</div>
        <div class="service-title">{{ service.title }}</div>
        <p class="service-desc">{{ service.description }}</p>
      </div>
    </div>
  </div>
</section>
